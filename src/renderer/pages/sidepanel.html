<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>サイドパネル</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="panel-body">
  <!-- 通常モード: セクション切り替え。Edgeのサイドパネル風に、右端の縦アイコンレール+左側にコンテンツ -->
  <div id="home">
    <div class="section-content">
      <div id="section-bookmarks" class="section">
        <div id="bookmark-list" class="panel-list"></div>
      </div>

      <div id="section-history" class="section">
        <input id="history-search" class="panel-input" type="text" placeholder="履歴を検索" spellcheck="false" autocomplete="off" />
        <div id="history-list" class="panel-list"></div>
      </div>

      <div id="section-notes" class="section">
        <textarea id="notes" placeholder="メモを入力(自動保存されます)" spellcheck="false"></textarea>
      </div>

      <div id="section-web" class="section">
        <p class="hint">よく使うサイトを登録して、ページを見ながら並行して使えます</p>
        <div class="web-add">
          <input id="web-url" class="panel-input" type="text" placeholder="URLを追加(例: gmail.com)" spellcheck="false" autocomplete="off" />
          <button id="web-add-btn" class="btn">追加</button>
        </div>
        <div id="web-list" class="panel-list"></div>
      </div>

      <div id="section-now-playing" class="section">
        <div id="now-playing-body"></div>
      </div>
    </div>

    <div class="section-tabs">
      <button class="section-tab" data-section="bookmarks" title="ブックマーク">
        <svg viewBox="0 0 24 24"><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.8 6.2 20.9l1.1-6.5L2.6 9.8l6.5-.9z"/></svg>
      </button>
      <button class="section-tab" data-section="history" title="履歴">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      </button>
      <button class="section-tab" data-section="notes" title="メモ">
        <svg viewBox="0 0 24 24"><path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
      </button>
      <button class="section-tab" data-section="web" title="Webパネル">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
      </button>
      <button id="now-playing-tab" class="section-tab hidden" data-section="now-playing" title="再生中">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </button>
      <div class="spacer"></div>
      <button id="panel-close" class="section-tab" title="サイドパネルを閉じる (Ctrl+Shift+S)">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Webパネルモード: このヘッダーだけ残して下にWebコンテンツが表示される -->
  <div id="web-header">
    <button id="web-back" class="hbtn" title="パネルメニューへ戻る">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div id="web-icons"></div>
    <div class="spacer"></div>
    <button id="web-reload" class="hbtn" title="再読み込み">
      <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36L21 8"/><path d="M21 3v5h-5"/></svg>
    </button>
    <button id="web-open-tab" class="hbtn" title="タブで開く">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
    </button>
  </div>

  <script src="theme.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
