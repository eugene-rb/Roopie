<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>サイドパネル</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="panel-body">
  <!-- 左端のリサイズハンドル(Edge/Vivaldiと同じくドラッグでパネル幅を変えられる) -->
  <div id="resize-handle" title="ドラッグして幅を変更"></div>

  <!-- アイコンレールは常時表示。クリックした先(組み込みセクション/Webパネル)をコンテンツ側に表示する -->
  <div id="home">
    <div class="section-content">
      <div id="panel-header">
        <span id="panel-header-title"></span>
        <!-- Webパネル表示中だけ表示するアクション -->
        <button id="web-reload" class="hbtn hidden" title="再読み込み">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
        <button id="web-open-tab" class="hbtn hidden" title="タブで開く">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
        </button>
      </div>

      <div id="section-bookmarks" class="section">
        <div id="bookmark-list" class="panel-list"></div>
      </div>

      <div id="section-downloads" class="section">
        <div id="downloads-list" class="panel-list"></div>
      </div>

      <div id="section-history" class="section">
        <input id="history-search" class="panel-input" type="text" placeholder="履歴を検索" spellcheck="false" autocomplete="off" />
        <div id="history-list" class="panel-list"></div>
      </div>

      <div id="section-notes" class="section">
        <textarea id="notes" placeholder="メモを入力(自動保存されます)" spellcheck="false"></textarea>
      </div>

      <div id="section-readlist" class="section">
        <button id="readlist-add-btn" class="btn readlist-add">現在のページを追加</button>
        <div class="readlist-toolbar">
          <button id="readlist-filter-btn" class="item-btn">未読のみ</button>
          <button id="readlist-clear-btn" class="item-btn">既読を消す</button>
        </div>
        <div id="readlist-list" class="panel-list"></div>
      </div>

      <div id="section-web" class="section">
        <p class="hint">よく使うサイトを登録して、ページを見ながら並行して使えます</p>
        <div class="web-add">
          <input id="web-url" class="panel-input" type="text" placeholder="URLを追加(例: gmail.com)" spellcheck="false" autocomplete="off" />
          <button id="web-add-btn" class="btn">追加</button>
        </div>
        <div id="web-list" class="panel-list"></div>
      </div>

      <div id="section-now-playing" class="section">
        <div id="now-playing-body"></div>
      </div>
    </div>

    <!-- アイコンレール(常時表示)。並びはVivaldiのパネルと同じ:
         ブックマーク/ダウンロード/履歴/メモ/リーディングリスト → Webパネル → 追加(+)。
         何もないところを右クリックすると左右切替/追加/非表示のメニューが出る -->
    <div class="section-tabs" id="rail">
      <button class="section-tab" data-section="bookmarks" title="ブックマーク">
        <svg viewBox="0 0 24 24"><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.8 6.2 20.9l1.1-6.5L2.6 9.8l6.5-.9z"/></svg>
      </button>
      <button class="section-tab" data-section="downloads" title="ダウンロード">
        <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
      </button>
      <button class="section-tab" data-section="history" title="履歴">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      </button>
      <button class="section-tab" data-section="notes" title="メモ">
        <svg viewBox="0 0 24 24"><path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
      </button>
      <button class="section-tab" data-section="readlist" title="リーディングリスト(後で読む)">
        <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </button>
      <button class="section-tab" data-section="web" title="Webパネルを管理">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
      </button>
      <!-- 登録したWebパネルをアイコンレールに直接ピン留め表示(クリックで即表示) -->
      <div id="web-pin-list"></div>
      <!-- Vivaldiのパネル最下部の「+」と同じ: ウェブパネルの追加 -->
      <button id="web-add-tab" class="section-tab" title="ウェブパネルを追加">
        <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      </button>
      <button id="now-playing-tab" class="section-tab hidden" data-section="now-playing" title="再生中">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </button>
      <div class="spacer"></div>
    </div>
  </div>

  <!-- Webパネルの編集(名前/URL/アイコン)。右クリックメニューから開く -->
  <div id="web-edit" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-title" id="web-edit-title"></div>

      <div id="web-edit-text-mode">
        <input id="web-edit-input" class="panel-input" type="text" spellcheck="false" autocomplete="off" />
      </div>

      <div id="web-edit-icon-mode" class="hidden">
        <div id="web-edit-emoji" class="emoji-grid"></div>
        <input id="web-edit-emoji-input" class="panel-input" type="text" placeholder="絵文字を直接入力" />
        <div class="modal-btn-row">
          <button id="web-edit-upload" class="btn">画像を選択</button>
          <button id="web-edit-reset-icon" class="btn">faviconに戻す</button>
        </div>
      </div>

      <div id="web-edit-error" class="modal-error hidden"></div>

      <div class="modal-actions">
        <button id="web-edit-cancel" class="btn">キャンセル</button>
        <button id="web-edit-apply" class="btn primary">適用</button>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
