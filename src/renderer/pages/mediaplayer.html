<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>ミニプレイヤー</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="player-body">
  <div id="player">
    <div id="player-main">
      <div id="player-art">
        <svg id="player-art-fallback" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <img id="player-art-img" class="hidden" alt="" />
      </div>

      <div id="player-info">
        <div id="player-title"></div>
        <div id="player-artist"></div>
      </div>

      <div id="player-actions">
        <button id="player-prev" class="pbtn-min hidden" title="前へ">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M6 6h2v12H6zM20 6v12l-9-6z"/></svg>
        </button>
        <button id="player-toggle" class="pbtn" title="再生 / 一時停止">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5l12 7-12 7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="hidden"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
        </button>
        <button id="player-next" class="pbtn-min hidden" title="次へ">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M16 6h2v12h-2zM4 6l9 6-9 6z"/></svg>
        </button>
      </div>
    </div>

    <div id="player-seek">
      <input id="player-range" type="range" min="0" max="1000" value="0" />
    </div>

    <div id="player-tools">
      <button id="player-pip" class="tbtn hidden" title="ピクチャーインピクチャー">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><rect x="12" y="12" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg>
      </button>
      <button id="player-dock" class="tbtn" title="サイドパネルに格納">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
      </button>
      <div class="spacer"></div>
      <button id="player-dismiss" class="tbtn" title="閉じる">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="mediaplayer.js"></script>
</body>
</html>
