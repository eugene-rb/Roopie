<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>メニュー</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="menu-body">
  <!-- ページの上に重なる透明レイヤー。外側クリックで閉じる -->
  <div id="backdrop">
    <div id="menu" class="hidden">
      <div class="menu-label">プロファイル</div>
      <div id="items"></div>
      <div class="menu-separator"></div>
      <button id="new-window" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
        </span>
        <span class="name">新しいウィンドウ</span>
        <span class="shortcut">Ctrl+N</span>
      </button>
      <button id="new-incognito" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><circle cx="7" cy="15" r="3.5"/><circle cx="17" cy="15" r="3.5"/><path d="M10.5 15h3M5 9l2-4h10l2 4"/></svg>
        </span>
        <span class="name">シークレットウィンドウ</span>
        <span class="shortcut">Ctrl+Shift+N</span>
      </button>
      <div class="menu-separator"></div>
      <button id="manage" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 7h-9M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        </span>
        <span class="name">プロファイルと設定</span>
      </button>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="menu.js"></script>
</body>
</html>
