<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>メニュー</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="menu-body">
  <!-- タブをドラッグして分割するためのドロップゾーン(ドラッグ中だけ表示) -->
  <div id="drop-zones" class="hidden">
    <div id="drop-preview"></div>
    <!-- 中央は分割ゾーンの抜け。ここへ落とすと新しいウィンドウになるので、その目印を出す
         (ドラッグを透過させる必要があるので pointer-events は持たせない) -->
    <div id="drop-detach-hint">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
      <span>新しいウィンドウで開く</span>
    </div>
    <div class="drop-zone" data-zone="left"></div>
    <div class="drop-zone" data-zone="right"></div>
    <div class="drop-zone" data-zone="top"></div>
    <div class="drop-zone" data-zone="bottom"></div>
  </div>

  <!-- ページの上に重なる透明レイヤー。外側クリックで閉じる -->
  <div id="backdrop">
    <div id="menu" class="hidden">
      <div class="menu-label">プロファイル</div>
      <div id="items"></div>
      <div class="menu-separator"></div>
      <button id="new-window" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
        </span>
        <span class="name">新しいウィンドウ</span>
        <span class="shortcut">Ctrl+N</span>
      </button>
      <button id="new-incognito" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><circle cx="7" cy="15" r="3.5"/><circle cx="17" cy="15" r="3.5"/><path d="M10.5 15h3M5 9l2-4h10l2 4"/></svg>
        </span>
        <span class="name">シークレットウィンドウ</span>
        <span class="shortcut">Ctrl+Shift+N</span>
      </button>
      <div class="menu-separator"></div>
      <button id="manage" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 7h-9M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        </span>
        <span class="name">プロファイルと設定</span>
      </button>
    </div>

    <!-- 拡張機能メニュー(Edgeのパズルボタン風)。行クリックで実行、ピンでツールバー表示を切替 -->
    <div id="ext-menu" class="hidden">
      <div class="menu-label">拡張機能</div>
      <div id="ext-items"></div>
      <div class="menu-separator"></div>
      <button id="ext-manage" class="menu-item">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 7h-9M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        </span>
        <span class="name">拡張機能の管理</span>
      </button>
    </div>

    <!-- QRコードのポップアップ -->
    <div id="qr-popup" class="hidden">
      <div class="qr-title">QRコード</div>
      <div class="qr-canvas-wrap">
        <canvas id="qr-canvas"></canvas>
      </div>
      <label class="qr-field-label">内容(編集できます)</label>
      <textarea id="qr-text" class="qr-text" rows="2" spellcheck="false"></textarea>
      <div class="qr-actions">
        <button id="qr-center-btn" class="btn">中央のマーク</button>
        <button id="qr-center-clear" class="btn hidden">削除</button>
        <button id="qr-download" class="btn primary">ダウンロード</button>
      </div>
      <input id="qr-logo-input" type="file" accept="image/*" class="hidden" />
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="qrcode.js"></script>
  <script src="menu.js"></script>
</body>
</html>
