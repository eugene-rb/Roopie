<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>プロファイルと設定</title>
  <link rel="stylesheet" href="pages.css" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <main class="page">
    <div class="page-header">
      <h1>プロファイルと設定</h1>
      <button id="add-btn" class="btn">＋ プロファイルを追加</button>
    </div>

    <p class="note">
      プロファイルを切り替えると、Cookie・ログインセッションは完全に分離されます。
      下の項目は「共有する」をオンにすると全プロファイル共通のデータを使い、オフにするとそのプロファイル専用のデータを使います。
    </p>

    <div id="profiles"></div>

    <h2 class="section-title">ブラウザ設定</h2>
    <div class="card">
      <div class="setting-row">
        <div>
          <div class="setting-name">ブックマークバーを表示</div>
          <div class="setting-desc">ツールバーの下にブックマークを常時表示します(Ctrl+Shift+B)</div>
        </div>
        <label class="switch">
          <input id="show-bookmark-bar" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </main>

  <script src="settings.js"></script>
</body>
</html>
