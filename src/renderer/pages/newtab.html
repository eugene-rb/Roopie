<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>新しいタブ</title>
  <link rel="stylesheet" href="pages.css" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <main id="newtab">
    <div id="clock">
      <div id="time">--:--</div>
      <div id="greeting"></div>
    </div>

    <input
      id="search"
      type="text"
      placeholder="検索またはURLを入力"
      spellcheck="false"
      autocomplete="off"
      autofocus
    />

    <div id="quick-links"></div>
  </main>

  <script src="newtab.js"></script>
</body>
</html>
