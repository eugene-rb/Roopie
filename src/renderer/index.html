<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- style-srcの'unsafe-inline'は拡張機能アイコン(<browser-action-list>)がインラインstyleを使うため必要 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data: crx:; style-src 'self' 'unsafe-inline'" />
  <title>Roopie</title>
  <link rel="stylesheet" href="pages/app.css" />
</head>
<body class="chrome-body">
  <div id="chrome">
    <!-- タブバー(通常は上部でタイトルバーを兼ねる。縦タブ表示では左側の固定レールになる) -->
    <div id="tab-bar">
      <!-- 横タブでは透過(display:contents)、縦タブではレール最上部の1行になるヘッダー -->
      <div id="tab-bar-head">
        <button id="tab-bar-position-btn" class="icon-btn" title="タブバーの位置を切り替え">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="6" height="16" rx="1.5"/><rect x="11" y="4" width="10" height="16" rx="1.5"/></svg>
        </button>
        <!-- Edgeの「ワークスペース」に相当するプロファイル切り替え。プロファイル色で着色したピル -->
        <button id="workspace-btn" title="プロファイルを切り替え">
          <span id="workspace-avatar" class="avatar"></span>
          <span id="workspace-name"></span>
          <span id="workspace-tor" class="hidden" title="Torで接続中">🧅</span>
          <svg class="workspace-chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div id="tabs"></div>
      <button id="new-tab-btn" class="icon-btn" title="新しいタブ (Ctrl+T)">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <!-- ツールバー -->
    <div id="toolbar">
      <button id="back-btn" class="icon-btn" title="戻る (Alt+←)">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <button id="forward-btn" class="icon-btn" title="進む (Alt+→)">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <button id="reload-btn" class="icon-btn" title="再読み込み (Ctrl+R)">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>

      <div id="address-wrap">
        <span id="address-icon">
          <svg id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <svg id="icon-lock" viewBox="0 0 24 24" class="hidden"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </span>
        <input
          id="address-bar"
          type="text"
          placeholder="URLを入力するか、Googleで検索"
          spellcheck="false"
          autocomplete="off"
        />
        <button id="star-btn" title="このページをブックマーク (Ctrl+D)">
          <svg viewBox="0 0 24 24"><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.8 6.2 20.9l1.1-6.5L2.6 9.8l6.5-.9z"/></svg>
        </button>
      </div>

      <!-- インストール済み拡張機能のツールバーアイコン(ポップアップも含めライブラリが管理)。
           <browser-action-list> はDOM接続時のpartitionでしか更新を購読しないため、
           プロファイル確定後に renderer.js がこの中へ要素を生成する -->
      <div id="extensions-area"></div>

      <div id="toolbar-utility">
        <button id="downloads-btn" class="icon-btn" title="ダウンロード (Ctrl+J)">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </button>
        <button id="sidepanel-btn" class="icon-btn" title="サイドパネル (F4)">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
        </button>
        <button id="history-btn" class="icon-btn" title="履歴 (Ctrl+H)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        </button>
        <button id="qr-btn" class="icon-btn" title="このページのQRコード">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M20 14v.01M14 20v.01M17 20v.01M20 17v3"/></svg>
        </button>

        <!-- 画面分割中だけ表示: 分割方向の切り替え/解除 -->
        <div id="split-controls" class="hidden">
          <button id="split-direction-btn" class="icon-btn" title="分割方向を切り替え">
            <svg id="icon-split-row" viewBox="0 0 24 24"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg>
            <svg id="icon-split-column" viewBox="0 0 24 24" class="hidden"><rect x="4" y="3" width="16" height="8" rx="1"/><rect x="4" y="13" width="16" height="8" rx="1"/></svg>
          </button>
          <button id="split-close-btn" class="icon-btn" title="分割表示を閉じる">
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <span id="zoom-controls" title="ホイールで拡大縮小">
          <button id="zoom-out-btn" class="icon-btn" title="縮小 (Ctrl+-)">
            <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
          </button>
          <span id="zoom-label" title="実際のサイズに戻す (Ctrl+0)">100%</span>
          <button id="zoom-in-btn" class="icon-btn" title="拡大 (Ctrl++)">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </span>
      </div>

      <button id="settings-btn" class="icon-btn" title="プロファイルと設定 (Ctrl+,)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/></svg>
      </button>
    </div>

    <!-- ブックマークバー -->
    <div id="bookmark-bar"></div>

    <!-- パスワード保存の確認バー -->
    <div id="password-bar" class="hidden">
      <svg class="pw-icon" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <span id="password-text"></span>
      <button id="password-save" class="bar-btn primary">保存する</button>
      <button id="password-dismiss" class="bar-btn">今はしない</button>
    </div>

    <!-- ページ内検索バー -->
    <div id="find-bar" class="hidden">
      <input id="find-input" type="text" placeholder="ページ内を検索" spellcheck="false" autocomplete="off" />
      <span id="find-count">0/0</span>
      <button id="find-prev" class="icon-btn" title="前へ (Shift+Enter)">
        <svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
      </button>
      <button id="find-next" class="icon-btn" title="次へ (Enter)">
        <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button id="find-close" class="icon-btn" title="閉じる (Esc)">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
