<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self'" />
  <title>Roopie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="chrome">
    <!-- タブバー -->
    <div id="tab-bar">
      <div id="tabs"></div>
      <button id="new-tab-btn" class="icon-btn" title="新しいタブ (Ctrl+T)">+</button>
    </div>

    <!-- ツールバー -->
    <div id="toolbar">
      <button id="back-btn" class="icon-btn" title="戻る (Alt+←)">&#x2190;</button>
      <button id="forward-btn" class="icon-btn" title="進む (Alt+→)">&#x2192;</button>
      <button id="reload-btn" class="icon-btn" title="再読み込み (Ctrl+R)">&#x21bb;</button>

      <div id="address-wrap">
        <input
          id="address-bar"
          type="text"
          placeholder="URLを入力するか、Googleで検索"
          spellcheck="false"
          autocomplete="off"
        />
        <button id="star-btn" title="このページをブックマーク (Ctrl+D)">☆</button>
      </div>

      <button id="zoom-out-btn" class="icon-btn" title="縮小 (Ctrl+-)">&minus;</button>
      <span id="zoom-label" title="実際のサイズに戻す (Ctrl+0)">100%</span>
      <button id="zoom-in-btn" class="icon-btn" title="拡大 (Ctrl++)">+</button>
      <button id="downloads-btn" class="icon-btn" title="ダウンロード (Ctrl+J)">&#x2913;</button>
      <button id="history-btn" class="icon-btn" title="履歴 (Ctrl+H)">&#x1f551;</button>
    </div>

    <!-- ブックマークバー -->
    <div id="bookmark-bar"></div>

    <!-- ページ内検索バー -->
    <div id="find-bar" class="hidden">
      <input id="find-input" type="text" placeholder="ページ内を検索" spellcheck="false" autocomplete="off" />
      <span id="find-count">0/0</span>
      <button id="find-prev" class="icon-btn" title="前へ (Shift+Enter)">&#x2191;</button>
      <button id="find-next" class="icon-btn" title="次へ (Enter)">&#x2193;</button>
      <button id="find-close" class="icon-btn" title="閉じる (Esc)">&#x2715;</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
